<script>
    let texts = [
        "I enjoy naming files 'finalFinalVersion' just to rename them again.",
        "My favorite part of coding is spending hours on features no one asked for.",
        "I enjoy starting side projects then abandoning them.",
        "I installed Arch Linux just to tell people I use Arch, btw..",
        "I keep telling myself I'll remember the Vim commands next time.",
        "Jira tickets: where good ideas go to wait.",
        "I enjoy naming variables 'foo' and 'bar' just to confuse myself later.",
        "Sometimes, I intentionally use : any in TypeScript just to see the world burn.",
        "Story points where arbitrary numbers mean something, but we just don't know what yet",
        "When it works, javascript async/await works 90% of the time. Don't count on it though",
    ]

    function displayRandomText() {
        const subTextElement = document.getElementById('sub-text');
        const randomIndex = Math.floor(Math.random() * texts.length);
        subTextElement.textContent = texts[randomIndex];
    }

    displayRandomText();
    setInterval(displayRandomText, 3000);

</script>
